<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Account Recovery</h2>
      <p *ngIf="step === 1">Enter your email to receive a secure access code.</p>
      <p *ngIf="step === 2">Check your inbox. Enter the code to reset your password.</p>
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

    <form [formGroup]="emailForm" (ngSubmit)="requestOtp()" *ngIf="step === 1">
      <div class="form-group">
        <label>Registered Email</label>
        <input type="email" formControlName="email" placeholder="client@eventmaster.com" class="form-control">
      </div>
      <button type="submit" class="btn-submit" [disabled]="!emailForm.valid || isLoading">
        {{ isLoading ? 'Transmitting...' : 'Send Secure Code' }}
      </button>
      <div class="back-link"><a routerLink="/login" style="color: #64748b; font-size: 0.9rem; text-decoration: none; display: block; text-align: center; margin-top: 15px;">Cancel & Return to Login</a></div>
    </form>

    <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" *ngIf="step === 2">
      <div class="form-group">
        <label>6-Digit Security Code</label>
        <input type="text" formControlName="otp" placeholder="000000" class="form-control" maxlength="6">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" formControlName="newPassword" placeholder="Minimum 6 characters" class="form-control">
      </div>
      <button type="submit" class="btn-submit" [disabled]="!resetForm.valid || isLoading">
        {{ isLoading ? 'Verifying...' : 'Authorize New Password' }}
      </button>
    </form>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Account Recovery</h2>
      <p *ngIf="step === 1">Enter your email to verify your identity.</p>
      <p *ngIf="step === 2">Answer your security questions to reset password.</p>
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

    <form [formGroup]="emailForm" (ngSubmit)="verifyEmail()" *ngIf="step === 1">
      <div class="form-group">
        <label>Registered Email</label>
        <input type="email" formControlName="email" placeholder="planner@eventmaster.com" class="form-control">
      </div>
      <button type="submit" class="btn-submit" [disabled]="!emailForm.valid || isLoading">
        {{ isLoading ? 'Searching...' : 'Search Account' }}
      </button>
      <div class="back-link"><a routerLink="/login">Cancel & Return to Login</a></div>
    </form>

    <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" *ngIf="step === 2">
      <div class="form-group">
        <label>1. {{ questions.q1 }}</label>
        <input type="text" formControlName="a1" placeholder="Your Answer" class="form-control">
      </div>
      <div class="form-group">
        <label>2. {{ questions.q2 }}</label>
        <input type="text" formControlName="a2" placeholder="Your Answer" class="form-control">
      </div>
      <div class="form-group">
        <label>3. {{ questions.q3 }}</label>
        <input type="text" formControlName="a3" placeholder="Your Answer" class="form-control">
      </div>
      
      <div style="height: 1px; background: #e2e8f0; margin: 25px 0;"></div>

      <div class="form-group">
        <label>Create New Password</label>
        <input type="password" formControlName="newPassword" placeholder="Strong password required" class="form-control">
        <div *ngIf="resetForm.get('newPassword')?.touched && resetForm.get('newPassword')?.invalid" style="color: var(--c-orange); font-size: 12px; margin-top: 6px; font-weight: 600;">
          Must be at least 8 characters, 1 uppercase, 1 lowercase, 1 number, and 1 symbol.
        </div>
      </div>
      
      <button type="submit" class="btn-submit" [disabled]="!resetForm.valid || isLoading">
        {{ isLoading ? 'Verifying Identity...' : 'Authorize New Password' }}
      </button>
      <div class="back-link"><a routerLink="/login">Cancel</a></div>
    </form>
  </div>
</div>
